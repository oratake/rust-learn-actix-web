<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Todo App</title>
</head>

<body>
  <div>
    {% for entry in entries %}
    <div>
      <div>id: {{ entry.id }}, text: {{ entry.text }}</div>
      <form action="/delete" method="POST">
        <input type="hidden" name="id" value="{{ entry.id }}">
        <button>DELETE</button>
      </form>
    </div>
    {% endfor %}
  </div>

  <form action="/add">
    <div>
      <input name="text">
    </div>
    <div>
      <button>ADD</button>
    </div>
  </form>
</body>

</html>
